<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Paper.io Web</title>
    <style>
        body {
            background-color: #323232; /* Notre fameux GRIS_FOND */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
            font-family: Arial, sans-serif;
        }
        #game-container {
            text-align: center;
        }
        canvas {
            border: 4px solid #000;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            touch-action: none
        }
        h1 { margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="game-container">
        <h1>Paper.io Multiplayer</h1>
        <canvas id="gameCanvas" width="1000" height="1000"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        
        const N = 50;
        const CELL_SIZE = 50;

        // Connexion au serveur Python !
        // Change 127.0.0.1 par ton IP Radmin/VPN quand tes potes voudront jouer
        const ws = new WebSocket("wss://server-paper-io-lilian.onrender.com");

        let mon_id = null;
        let players = {};
        let grid = [];

        // --- RÉCEPTION DES MESSAGES DU SERVEUR ---
       ws.onmessage = function(event) {
            const message = JSON.parse(event.data);
            
            if (message.type === "init") {
                mon_id = message.data.id;
                console.log("Connecté en tant que Joueur " + mon_id);
            } 
            else if (message.type === "update") {
                grid = message.grid;
                
                // On met à jour les joueurs sans écraser leur position visuelle (l'animation)
                let newPlayers = message.players;
                for (let pid in newPlayers) {
                    if (players[pid]) {
                        newPlayers[pid].visualX = players[pid].visualX;
                        newPlayers[pid].visualY = players[pid].visualY;
                    } else {
                        // C'est un nouveau joueur, on l'initialise
                        newPlayers[pid].visualX = newPlayers[pid].x * CELL_SIZE;
                        newPlayers[pid].visualY = newPlayers[pid].y * CELL_SIZE;
                    }
                }
                players = newPlayers;
                // /!\ On a enlevé dessinerJeu() d'ici, car il va tourner tout seul à 60 FPS !
            }
        };

        ws.onclose = function() {
            alert("Connexion au serveur perdue !");
        };

        function gameLoop() {
            requestAnimationFrame(gameLoop); // Demande au navigateur de rappeler cette fonction à la prochaine frame
            dessinerJeu();
        }
        gameLoop(); // On lance la boucle au démarrage

        // --- ENVOI DES TOUCHES ---
        document.addEventListener("keydown", function(event) {
            // Empêcher la page de scroller quand on joue avec les flèches
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].indexOf(event.code) > -1) {
                event.preventDefault();
            }

            let action = null;
            if (event.key === "ArrowUp") action = {dx: 0, dy: -1};
            if (event.key === "ArrowDown") action = {dx: 0, dy: 1};
            if (event.key === "ArrowLeft") action = {dx: -1, dy: 0};
            if (event.key === "ArrowRight") action = {dx: 1, dy: 0};

            // Si on a appuyé sur une flèche et que le WebSocket est ouvert
            if (action && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(action));
            }
        });

        // --- LE MOTEUR GRAPHIQUE (Remplace Pygame) ---
        // --- LE MOTEUR GRAPHIQUE (Avec Caméra) ---
        // --- LE MOTEUR GRAPHIQUE (Fluide 60 FPS) ---
        function dessinerJeu() {
            // 1. Calcul de l'interpolation (Le glissement fluide)
            for (let pid in players) {
                let p = players[pid];
                let cibleX = p.x * CELL_SIZE;
                let cibleY = p.y * CELL_SIZE;
                
                // Le carré avance de 15% vers sa cible à chaque image (effet smooth garanti)
                p.visualX += (cibleX - p.visualX) * 0.15;
                p.visualY += (cibleY - p.visualY) * 0.15;
            }

            // 2. Effacer l'écran (Gris foncé)
            ctx.fillStyle = "#323232";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save(); 

            // --- CALCUL DE LA CAMÉRA (Fluide aussi !) ---
            if (mon_id && players[mon_id]) {
                let moi = players[mon_id];
                
                // On utilise visualX et visualY pour que la caméra glisse doucement
                let centreJoueurX = moi.visualX + (CELL_SIZE / 2);
                let centreJoueurY = moi.visualY + (CELL_SIZE / 2);
                
                let offsetX = (canvas.width / 2) - centreJoueurX;
                let offsetY = (canvas.height / 2) - centreJoueurY;
                
                ctx.translate(offsetX, offsetY);
            }

            // 3. Fond de la Map
            ctx.fillStyle = "#FFFFFF";
            ctx.fillRect(0, 0, N * CELL_SIZE, N * CELL_SIZE);

            // 4. Dessiner la Grille (Territoires et Traînées)
            for (let y = 0; y < N; y++) {
                for (let x = 0; x < N; x++) {
                    let v = grid[y][x];
                    if (v !== 0) {
                        let pid_case = Math.abs(v);
                        if (players[pid_case]) {
                            let rgb = players[pid_case].color; 
                            
                            if (v < 0) {
                                let r = Math.min(255, rgb[0] + 100);
                                let g = Math.min(255, rgb[1] + 100);
                                let b = Math.min(255, rgb[2] + 100);
                                ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
                            } else {
                                let r = Math.max(0, rgb[0] - 40);
                                let g = Math.max(0, rgb[1] - 40);
                                let b = Math.max(0, rgb[2] - 40);
                                ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
                            }
                            ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE - 1, CELL_SIZE - 1);
                        }
                    }
                }
            }

            // 5. Dessiner les têtes des joueurs (Elles glissent en douceur)
            for (let pid in players) {
                let p = players[pid];
                let rgb = p.color;
                
                ctx.fillStyle = `rgb(${rgb[0]}, ${rgb[1]}, ${rgb[2]})`;
                // On utilise visualX ici !
                ctx.fillRect(p.visualX, p.visualY, CELL_SIZE - 1, CELL_SIZE - 1);
                
                ctx.strokeStyle = "white";
                ctx.lineWidth = 2;
                ctx.strokeRect(p.visualX, p.visualY, CELL_SIZE - 1, CELL_SIZE - 1);
            }

            ctx.restore(); 
        }
        // --- GESTION DU TACTILE (SWIPES) ---
        let touchStartX = 0;
        let touchStartY = 0;

        // On note où le doigt se pose
        document.addEventListener('touchstart', function(e) {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, false);

        // On regarde où le doigt part et on calcule la direction
        document.addEventListener('touchend', function(e) {
            let touchEndX = e.changedTouches[0].screenX;
            let touchEndY = e.changedTouches[0].screenY;
            
            let diffX = touchEndX - touchStartX;
            let diffY = touchEndY - touchStartY;

            let action = null;
            // On vérifie si le mouvement est assez grand pour être un vrai swipe (min 30px)
            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (Math.abs(diffX) > 30) {
                    action = (diffX > 0) ? {dx: 1, dy: 0} : {dx: -1, dy: 0}; // Droite ou Gauche
                }
            } else {
                if (Math.abs(diffY) > 30) {
                    action = (diffY > 0) ? {dx: 0, dy: 1} : {dx: 0, dy: -1}; // Bas ou Haut
                }
            }

            if (action && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(action));
            }
        }, false);
    </script>
</body>
</html>
